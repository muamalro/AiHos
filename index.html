        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #1f2a44;
            --navy-light: #2c3a5e;
            --gold: #c9a24b;
            --gold-light: #e6cf9c;
            --bg: #f4f5f7;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --error-text: #c62828;
            --bottom-bar-h: 64px;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--navy);
            overflow: hidden;
        }

        /* ── INTRO ── */
        #intro {
            position: fixed; inset: 0;
            background: var(--navy);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        #intro video { width: 100%; height: 100%; object-fit: cover; }

        /* ── APP SHELL ── */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── TOP BAR ── */
        .top-bar {
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 60px;
            flex-shrink: 0;
            border-bottom: 2px solid var(--gold);
            position: relative;
            z-index: 100;
        }

        .top-bar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar-logo img {
            height: 36px;
            width: 36px;
            border-radius: 8px;
            object-fit: cover;
        }
        .top-bar-logo span {
            color: #fff;
            font-family: Georgia, serif;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .top-bar-search {
            flex: 1;
            margin: 0 12px;
            position: relative;
        }
        .top-bar-search input {
            width: 100%;
            padding: 8px 36px 8px 12px;
            border: 1px solid rgba(201,162,75,0.4);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .top-bar-search input::placeholder { color: rgba(255,255,255,0.5); }
        .top-bar-search input:focus {
            background: rgba(255,255,255,0.18);
            border-color: var(--gold);
        }
        .top-bar-search iconify-icon {
            position: absolute;
            left: 10px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }

        /* ── PAGE TITLE BAR ── */
        .page-title-bar {
            padding: 14px 16px 8px;
            flex-shrink: 0;
        }
        .page-title-bar h1 {
            font-family: Georgia, serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--navy);
            border-bottom: 2.5px solid var(--gold);
            padding-bottom: 8px;
            display: inline-block;
        }

        /* ── SCROLL AREA ── */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 80px;
            -webkit-overflow-scrolling: touch;
        }

        /* ── CARD GRID ── */
        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .project-card:active {
            transform: scale(0.97);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .project-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        .project-card h3 {
            padding: 8px 10px 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--navy);
            line-height: 1.4;
            text-align: center;
            flex: 1;
        }

        .project-card.featured {
            border: 2px solid var(--gold);
        }
        .project-card.featured::before {
            content: "★";
            position: absolute;
            top: 8px; right: 8px;
            background: var(--gold);
            color: var(--navy);
            font-size: 10px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 20px;
            z-index: 1;
        }

        .status-alert { border-color: var(--error-text) !important; }
        .status-alert h3 { color: var(--error-text); }

        /* ── ABOUT CARDS ── */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .about-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden;
            text-align: center;
        }
        .about-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            border-bottom: 2px solid var(--gold-light);
        }
        .about-card h3 {
            padding: 8px 8px 4px;
            font-size: 12px;
            font-weight: 700;
            color: var(--navy);
            line-height: 1.4;
        }
        .about-card p {
            font-size: 11px;
            color: #5f6368;
            padding: 0 8px 10px;
            line-height: 1.5;
        }

        /* ── CONTACT CARDS ── */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .contact-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 18px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .contact-card h3 {
            color: var(--navy);
            font-family: Georgia, serif;
            font-size: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gold-light);
            margin-bottom: 12px;
            text-align: center;
        }
        .contact-card p {
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .contact-icon { font-size: 18px; color: var(--gold); flex-shrink: 0; }
        .contact-card a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
        }
        .contact-card a:hover { color: var(--gold); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--bottom-bar-h);
            background: var(--navy);
            display: flex;
            border-top: 2px solid var(--gold);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
            padding: 6px 2px;
            border: none;
            background: none;
        }
        .nav-item:active { background: rgba(201,162,75,0.15); }
        .nav-item.active { background: rgba(201,162,75,0.18); }

        .nav-item iconify-icon {
            font-size: 22px;
            color: rgba(230,207,156,0.55);
            transition: color 0.2s;
        }
        .nav-item.active iconify-icon,
        .nav-item:hover iconify-icon { color: var(--gold); }

        .nav-item span {
            font-size: 9px;
            color: rgba(230,207,156,0.55);
            text-align: center;
            line-height: 1.2;
            transition: color 0.2s;
        }
        .nav-item.active span,
        .nav-item:hover span { color: var(--gold-light); }

        .nav-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--gold);
            position: absolute;
            top: 6px;
        }

        /* ── TABLETS / DESKTOP ── */

            .about-grid { grid-template-columns: repeat(3, 1fr); }
            .scroll-area { padding: 12px 20px 90px; }
        }
        @media (min-width: 960px) {
            .projects { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

<!-- INTRO -->
<div id="intro">
  <video autoplay muted playsinline id="introVideo">
    <source src="intro.mp4" type="video/mp4">
    <source src="intro.webm" type="video/webm">
  </video>
</div>
<script>
  const intro = document.getElementById("intro");
  const video = document.getElementById("introVideo");
  let introHidden = false;
  function hideIntro() {
    if (introHidden) return; introHidden = true;
    intro.style.opacity = "0";
    setTimeout(() => { intro.style.display = "none"; document.body.style.overflow = ""; }, 1000);
  }
  if (localStorage.getItem("introPlayed")) { intro.style.display = "none"; }
  else {
    document.body.style.overflow = "hidden";
    if (video) {
      video.onended = () => setTimeout(hideIntro, 500);
      video.querySelectorAll('source').forEach(s => s.addEventListener('error', hideIntro));
      video.play().catch(hideIntro);
    }
    setTimeout(hideIntro, 4000);
    localStorage.setItem("introPlayed", "true");
  }
</script>

const contentArea = document.getElementById('contentArea');
const pageTitle = document.getElementById('pageTitle');
const navItems = document.querySelectorAll('.nav-item');

function switchPage(page) {
  const data = pages[page];
  if (!data) return;
  pageTitle.textContent = data.title;
  contentArea.innerHTML = data.content;
  contentArea.scrollTop = 0;
  navItems.forEach(n => n.classList.toggle('active', n.dataset.page === page));
  localStorage.setItem('activePage', page);
}

navItems.forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));

const lastPage = localStorage.getItem('activePage') || 'dashboard';
switchPage(lastPage);

document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') alert('جاري البحث عن: ' + e.target.value);
});
